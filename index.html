<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Right To Bear — Marketing Projects</title>
<style>
  :root{
    --bg:#0a0a0a;
    --card:#141414;
    --card-hover:#181818;
    --border:#262626;
    --border-hover:#5c5c5c;
    --text:#ffffff;
    --muted:#8a8a8a;
    --dim:#6b6b6b;
    --accent:#c8a24b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2.5rem 1.25rem;
  }
  .wrap{width:100%;max-width:900px}
  header{text-align:center;margin-bottom:2.5rem}
  .title{font-size:26px;font-weight:600;letter-spacing:.01em}
  .subtitle{font-size:14px;color:var(--muted);margin-top:.4rem}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:14px;
  }
  .card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    transition:border-color .16s ease,background-color .16s ease,transform .16s ease;
  }
  .card:hover,.card:focus-visible{
    border-color:var(--border-hover);
    background:var(--card-hover);
    transform:translateY(-2px);
    outline:none;
  }
  .card:focus-visible{border-color:var(--accent)}
  .icon{color:var(--accent);display:block;height:26px}
  .icon svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .name{font-size:16px;font-weight:600;margin-top:14px}
  .desc{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
  footer{margin-top:2.5rem;text-align:center}
  footer a{color:var(--dim);font-size:13px;text-decoration:none;letter-spacing:.02em}
  footer a:hover{color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">Right To Bear</div>
      <div class="subtitle">Marketing projects hub</div>
    </header>

    <nav class="grid">
      <a class="card" href="spiderweb/">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.4"/><path d="M12 3v6.6M12 14.4V21M3 12h6.6M14.4 12H21M5.6 5.6l4.7 4.7M13.7 13.7l4.7 4.7M18.4 5.6l-4.7 4.7M10.3 13.7l-4.7 4.7"/></svg></span>
        <div class="name">Spiderweb</div>
        <div class="desc">Task and workload dashboard</div>
      </a>

      <a class="card" href="daily-news-brief/">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 4H5a1 1 0 0 0-1 1v13a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V6"/><path d="M18 8h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2"/><path d="M7 8h6M7 11h6M7 14h4"/></svg></span>
        <div class="name">Daily brief</div>
        <div class="desc">2A daily intel</div>
      </a>

      <a class="card" href="weekly-news-brief/">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M16 3v4M8 3v4M4 10h16M8 14h3M13 14h3M8 17h3"/></svg></span>
        <div class="name">Weekly brief</div>
        <div class="desc">2A weekly recap</div>
      </a>

      <a class="card" href="social-media-utm.html">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 15l6-6"/><path d="M11 6l.5-.5a4 4 0 0 1 5.7 5.7l-2 2"/><path d="M13 18l-.5.5a4 4 0 0 1-5.7-5.7l2-2"/></svg></span>
        <div class="name">UTM builder</div>
        <div class="desc">Tracked-link generator</div>
      </a>

      <a class="card" href="share-on-social.html">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M8.1 10.9l7.8-3.8M8.1 13.1l7.8 3.8"/></svg></span>
        <div class="name">Share on social</div>
        <div class="desc">Ready-to-post feed</div>
      </a>
    </nav>

    <footer>
      <a href="https://protectwithbear.com">protectwithbear.com</a>
    </footer>
  </div>
</body>
</html>
